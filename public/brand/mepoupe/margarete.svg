<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 240" width="80" height="240" aria-label="Margarete — a colher de pau do Me Poupe!">
  <!-- Wooden spoon ("Margarete") — the Me Poupe! mascot icon.
       Used as section divider / sticker / cursor / accent. -->
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#B47137" />
      <stop offset="50%" stop-color="#D49155" />
      <stop offset="100%" stop-color="#A05E28" />
    </linearGradient>
    <linearGradient id="woodHead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CD8748" />
      <stop offset="100%" stop-color="#9A5224" />
    </linearGradient>
  </defs>

  <!-- Handle (long stick) -->
  <rect x="33" y="60" width="14" height="160" rx="7" fill="url(#wood)" />
  <rect x="35.5" y="62" width="3" height="156" rx="1.5" fill="#E9A871" opacity="0.6" />

  <!-- Neck (where head meets handle) -->
  <rect x="30" y="56" width="20" height="12" rx="3" fill="#8E4A20" />

  <!-- Head (oval spoon) -->
  <ellipse cx="40" cy="38" rx="28" ry="30" fill="url(#woodHead)" />
  <ellipse cx="40" cy="34" rx="22" ry="22" fill="#9A5A28" />

  <!-- Wood grain rings on the head -->
  <ellipse cx="40" cy="34" rx="16" ry="16" fill="none" stroke="#7A3F15" stroke-width="1" opacity="0.35" />
  <ellipse cx="40" cy="34" rx="10" ry="10" fill="none" stroke="#7A3F15" stroke-width="1" opacity="0.25" />

  <!-- Highlight on head -->
  <ellipse cx="33" cy="25" rx="8" ry="5" fill="#E8A870" opacity="0.55" />

  <!-- Tiny "Margarete" wink: two dots for eyes -->
  <circle cx="34" cy="36" r="1.8" fill="#2B1508" />
  <circle cx="46" cy="36" r="1.8" fill="#2B1508" />
  <path d="M 33 44 Q 40 48 47 44" fill="none" stroke="#2B1508" stroke-width="1.8" stroke-linecap="round" />
</svg>
