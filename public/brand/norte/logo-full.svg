<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 112" width="340" height="112">
  <title>Norte Capital</title>

  <!-- Symbol: tight 112x112 on the left -->
  <g>
    <!-- Outer circle (stroke extends 1.5 outside radius, so cx/cy 56 r=52 leaves 2.5px clearance each side) -->
    <circle cx="56" cy="56" r="52" fill="none" stroke="#0C1E3C" stroke-width="3"/>

    <!-- Ticks (4 cardinal) -->
    <g stroke="#0C1E3C" stroke-width="2" stroke-linecap="round">
      <line x1="56" y1="6" x2="56" y2="12"/>
      <line x1="106" y1="56" x2="100" y2="56"/>
      <line x1="56" y1="106" x2="56" y2="100"/>
      <line x1="6" y1="56" x2="12" y2="56"/>
    </g>

    <!-- Needle (amber north / navy south) -->
    <path d="M 56 18 L 66 56 L 46 56 Z" fill="#C8932F"/>
    <path d="M 56 94 L 66 56 L 46 56 Z" fill="#0C1E3C"/>

    <!-- Pivot dot -->
    <circle cx="56" cy="56" r="3" fill="#C8932F"/>
    <circle cx="56" cy="56" r="1.2" fill="#0C1E3C"/>
  </g>

  <!-- Wordmark: starts right after symbol with a small gap -->
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <!-- NORTE — centered vertically against the circle center (y=56) -->
    <text x="128" y="64" font-size="44" font-weight="700" fill="#0C1E3C" letter-spacing="3">NORTE</text>
    <!-- CAPITAL — small tag below -->
    <text x="130" y="88" font-size="12" font-weight="500" fill="#6B6A5E" letter-spacing="6.5">CAPITAL</text>
  </g>
</svg>
