name: frontend tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Vitest
    runs-on: ubuntu-latest

    env:
      NUXT_TELEMETRY_DISABLED: '1'

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
